apiVersion: v1
kind: Service
metadata:
  name: jarvis-backend
  namespace: jarvis
  labels: { app: jarvis-backend }
spec:
  type: ClusterIP
  selector: { app: jarvis-backend }
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-backend
  namespace: jarvis
  labels: { app: jarvis-backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: jarvis-backend }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: jarvis-backend }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: backend
          image: ghcr.io/your-org/jarvis-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: jarvis-config }
            - secretRef: { name: jarvis-secrets }
          env:
            - name: WEB_CONCURRENCY
              value: "4"
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
