apiVersion: v1
kind: Service
metadata:
  name: jarvis-postgres
  namespace: jarvis
  labels: { app: jarvis-postgres }
spec:
  clusterIP: None
  selector: { app: jarvis-postgres }
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jarvis-postgres
  namespace: jarvis
spec:
  serviceName: jarvis-postgres
  replicas: 1
  selector:
    matchLabels: { app: jarvis-postgres }
  template:
    metadata:
      labels: { app: jarvis-postgres }
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: { configMapKeyRef: { name: jarvis-config, key: POSTGRES_USER } }
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: jarvis-config, key: POSTGRES_DB } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: jarvis-secrets, key: POSTGRES_PASSWORD } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"] }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
