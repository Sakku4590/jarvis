apiVersion: v1
kind: Service
metadata:
  name: jarvis-frontend
  namespace: jarvis
  labels: { app: jarvis-frontend }
spec:
  type: ClusterIP
  selector: { app: jarvis-frontend }
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-frontend
  namespace: jarvis
  labels: { app: jarvis-frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: jarvis-frontend }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: jarvis-frontend }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: frontend
          # NEXT_PUBLIC_API_URL is baked at build time (see frontend/Dockerfile
          # build args + the CI build step), not set here.
          image: ghcr.io/your-org/jarvis-frontend:latest
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
