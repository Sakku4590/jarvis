apiVersion: v1
kind: Service
metadata:
  name: jarvis-chroma
  namespace: jarvis
  labels: { app: jarvis-chroma }
spec:
  clusterIP: None
  selector: { app: jarvis-chroma }
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jarvis-chroma
  namespace: jarvis
spec:
  serviceName: jarvis-chroma
  replicas: 1
  selector:
    matchLabels: { app: jarvis-chroma }
  template:
    metadata:
      labels: { app: jarvis-chroma }
    spec:
      containers:
        - name: chroma
          image: chromadb/chroma:0.5.23
          ports:
            - containerPort: 8000
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"
          volumeMounts:
            - name: data
              mountPath: /chroma/chroma
          readinessProbe:
            httpGet: { path: /api/v2/heartbeat, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v2/heartbeat, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
