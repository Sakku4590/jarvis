# Production-flavoured compose: builds the backend and frontend images, runs
# database migrations once as a dedicated job, then starts the API and the
# dashboard. Bring it up with:
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# It reads .env for secrets and connection settings. Unlike the dev compose,
# code is baked into the images (no bind mounts) and nothing but the public
# ingress ports need be exposed.

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    image: chromadb/chroma:0.5.23
    restart: always
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "curl -f http://localhost:8000/api/v2/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot: apply migrations, then exit. The backend waits for it to succeed.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jarvis-backend:latest
    env_file: [.env]
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      CHROMA_HOST: chroma
      CHROMA_PORT_INTERNAL: 8000
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jarvis-backend:latest
    restart: always
    env_file: [.env]
    environment:
      APP_ENV: production
      LOG_FORMAT: json
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      CHROMA_HOST: chroma
      CHROMA_PORT_INTERNAL: 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_USER_ID: ${NEXT_PUBLIC_USER_ID:-00000000-0000-0000-0000-000000000001}
    image: jarvis-frontend:latest
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  chroma_data:
